log:
  level: info # debug, info, warn, error (default: info)
  format: text # text or json (default: text)

monitor:
  interval: 5s
  staleness: 500ms
  maxTerminated: 500
  minTerminatedEnergyThreshold: 10

host:
  sysfs: /sys 
  procfs: /proc 

rapl:
  zones: [] 

exporter:
  stdout:
    enabled: false

  prometheus: 
    enabled: true
    metricsLevel:
      - node
      - process
      - container

web:
  configFile: "" 
  listenAddresses: 
    - :8085

kube: 
  enabled: false 
  config: "" 
  nodeName: "" 

experimental:
  platform:
    redfish:
      enabled: false 
  hwmon:
    forceEnabled: false 
    zones: [] 
  gpu:
    enabled: false 
    idlePower: 0 
